hostname rc
password zebra
enable password zebra

router ospf
 router-id 3.3.3.3
# LAN de RC(HC1)
 network 172.16.0.0/23 area 1

# Enlace RB-RC
 network 192.168.100.4/30 area 1

 # Enlace RC-RZY
 network 192.168.100.8/30 area 1

 # Enlace RC-RF
network 192.168.100.72/30 area 0
# Costos de interfaz
interface eth0
 ip ospf cost 35

interface eth1
 ip ospf cost 37

interface eth2
 ip ospf cost 36

interface eth3
 ip ospf cost 10



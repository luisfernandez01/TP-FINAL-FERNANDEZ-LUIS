hostname rh
password zebra
enable password zebra

router ospf
 router-id 8.8.8.8

# LAN de RH (HH1)
 network 172.20.0.0/22 area 0

 # Enlace RH-RWX
 network 192.168.100.33/30 area 0

 # Enlace RH-RG
 network 192.168.100.26/30 area 0

 # Enlace RH-RA
 network 192.168.100.29/30 area 1
 
redistribute connected
  
#Costos de interfaz
interface eth1
 ip ospf cost 28   

interface eth2
 ip ospf cost 66   

interface eth3
 ip ospf cost 37   


